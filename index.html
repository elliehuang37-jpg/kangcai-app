<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --primary:#2E7D32; --primary-light:#4CAF50; --primary-dark:#1B5E20;
  --secondary:#FF8F00; --bg:#F5F5F5; --card:#FFF; --text:#212121;
  --text-light:#757575; --border:#E0E0E0; --shadow:0 2px 12px rgba(0,0,0,.1);
  --radius:16px; --nav:64px;
}
body { font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; min-height:100vh; overflow-x:hidden; }

/* Header */
.app-header { background:linear-gradient(135deg,#1B5E20,#2E7D32,#4CAF50); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.header-left { display:flex; align-items:center; gap:10px; }
.logo-icon { font-size:24px; }
.app-title { font-size:17px; font-weight:700; }
.app-subtitle { font-size:10px; opacity:.8; }
.search-btn { font-size:22px; cursor:pointer; }

/* Pages */
.page { display:none; padding-bottom:calc(var(--nav) + 12px); min-height:calc(100vh - 56px); animation:fadeIn .2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

/* Bottom Nav */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:var(--nav); background:#fff; border-top:1px solid var(--border); display:flex; box-shadow:0 -2px 12px rgba(0,0,0,.08); z-index:200; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--text-light); transition:.2s; }
.nav-item.active { color:var(--primary); }
.nav-icon { font-size:22px; }
.nav-label { font-size:10px; font-weight:600; }

/* HOME */
.hero { background:linear-gradient(135deg,#1B5E20,#2E7D32,#388E3C); color:#fff; padding:20px; margin-bottom:8px; position:relative; overflow:hidden; }
.hero::after { content:'🌿'; position:absolute; right:-10px; bottom:-10px; font-size:100px; opacity:.12; }
.hero-title { font-size:22px; font-weight:800; margin-bottom:6px; }
.hero-sub { font-size:12px; opacity:.85; line-height:1.5; }
.hero-badge { display:inline-block; background:var(--secondary); color:#fff; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; margin-top:10px; }

.section-title { font-size:12px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.8px; padding:14px 20px 8px; }

/* Category Grid */
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 8px; }
.cat-card { background:#fff; border-radius:var(--radius); padding:16px 14px; cursor:pointer; box-shadow:var(--shadow); border:2px solid transparent; position:relative; overflow:hidden; transition:.2s; }
.cat-card:active { transform:scale(.97); }
.cat-bar { position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:4px 0 0 4px; }
.cat-emoji { font-size:30px; display:block; margin-bottom:8px; }
.cat-name { font-size:13px; font-weight:700; line-height:1.3; }
.cat-count { font-size:11px; color:var(--text-light); margin-top:3px; }

/* Disease CTA */
.disease-cta { margin:0 16px 16px; background:linear-gradient(135deg,#1A237E,#3949AB); color:#fff; border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; }
.disease-cta:active { opacity:.9; }

/* CATEGORY PAGE */
.cat-page-header { padding:16px 20px 12px; background:#fff; border-bottom:1px solid var(--border); margin-bottom:10px; }
.cat-page-title { font-size:20px; font-weight:800; }
.cat-page-desc { font-size:12px; color:var(--text-light); margin-top:4px; line-height:1.5; }
.product-list { padding:0 16px; display:flex; flex-direction:column; gap:12px; }

.product-card { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:.2s; }

.product-card-img { height:160px; overflow:hidden; position:relative; background:#E8F5E9; }
.product-card-img img { width:100%; height:100%; object-fit:cover; object-position:left center; }
.product-card-img .img-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; backdrop-filter:blur(4px); }
.product-card-img .img-tag { position:absolute; top:8px; left:8px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; }
.tag-veg { background:#4CAF50; color:#fff; }
.tag-gov { background:#FF8F00; color:#fff; }
.product-card-body { padding:12px 16px; }
.product-card-name { font-size:15px; font-weight:700; }
.product-card-tagline { font-size:12px; color:var(--primary); font-weight:600; margin-top:3px; }
.product-card-target { font-size:11px; color:var(--text-light); margin-top:5px; line-height:1.4; }
.product-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.product-card-footer span { font-size:12px; color:var(--primary); font-weight:600; }

/* DETAIL PAGE */

.detail-body { padding:0 16px; }
.detail-name { font-size:21px; font-weight:800; margin-top:14px; }
.detail-tagline { font-size:14px; color:var(--primary); font-weight:600; margin-top:3px; }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.detail-tag { font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }

.detail-section { background:#fff; border-radius:var(--radius); padding:14px 16px; margin-top:12px; box-shadow:var(--shadow); }
.detail-section-title { font-size:13px; font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:6px; margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid #E8F5E9; }
.bullet { display:flex; gap:8px; margin-bottom:7px; align-items:flex-start; }
.bullet-dot { color:var(--primary); font-size:16px; line-height:1.4; flex-shrink:0; }
.bullet-text { font-size:13px; line-height:1.5; }

.chip { display:inline-block; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; margin:3px; }
.chip-green { background:#E8F5E9; color:#1B5E20; }
.chip-purple { background:#F3E5F5; color:#6A1B9A; }

.sales-box { background:linear-gradient(135deg,#FFF8E1,#FFF3E0); border-left:4px solid var(--secondary); border-radius:8px; padding:11px 13px; margin-bottom:8px; }
.sales-box p { font-size:12px; line-height:1.6; }
.sales-label { font-size:11px; font-weight:700; color:var(--secondary); margin-bottom:3px; }

.usage-box { background:#E3F2FD; border-radius:12px; padding:12px 14px; display:flex; gap:10px; align-items:flex-start; }
.usage-text { font-size:13px; line-height:1.6; color:#1565C0; font-weight:500; }

.info-row { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.info-row:last-child { border-bottom:none; }
.info-label { font-size:11px; font-weight:700; color:var(--text-light); min-width:55px; }
.info-value { font-size:12px; line-height:1.5; flex:1; }

/* SEARCH */
.search-bar { padding:12px 16px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:50; }
.search-wrap { position:relative; }
.search-input { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:10px 14px 10px 40px; font-size:14px; outline:none; font-family:inherit; transition:border-color .2s; }
.search-input:focus { border-color:var(--primary); }
.search-icon-abs { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:17px; color:var(--text-light); }
.search-results { padding:12px 16px; }
.search-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:13px; }
.search-item { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:9px; cursor:pointer; box-shadow:var(--shadow); display:flex; gap:10px; align-items:center; transition:.2s; }
.search-item:active { transform:scale(.99); }

.search-item-info { flex:1; min-width:0; }
.search-item-name { font-size:13px; font-weight:700; }

.search-item-target { font-size:11px; color:var(--text-light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

</head>

// ══════════════════════════════
// RENDER HOME
// ══════════════════════════════
function renderHome() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = categories.map(c => `
    <div class="cat-card" onclick="showCategory('${c.id}')">
      <div class="cat-bar" style="background:${c.color}"></div>
      <span class="cat-emoji">${c.emoji}</span>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${c.products.length} 項產品</div>
    </div>`).join('');
}

// ══════════════════════════════
// SHOW CATEGORY
// ══════════════════════════════
function showCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  const prods = cat.products.map(id => products[id]).filter(Boolean);

  document.getElementById('cat-page-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span onclick="showPage('home')" style="font-size:22px;cursor:pointer;color:${cat.color}">‹</span>
      <span style="font-size:28px">${cat.emoji}</span>
      <div>
        <div class="cat-page-title">${cat.name}</div>
        <div style="font-size:11px;color:var(--text-light)">${prods.length} 項產品</div>
      </div>
    </div>
    <div class="cat-page-desc">${cat.desc}</div>`;

  document.getElementById('product-list').innerHTML = prods.map(p => `
    <div class="product-card" onclick="showProduct('${p.id}')">
      <div class="product-card-img">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        ${p.certBadge ? `<span class="img-badge">${p.certBadge}</span>` : ''}
        ${p.badges[0] ? `<span class="img-tag ${p.badges[0].c}">${p.badges[0].t}</span>` : ''}
      </div>
      <div class="product-card-body">
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-tagline">${p.tag}・${p.tagline}</div>
        <div class="product-card-target">👥 ${p.target.split('／')[0]}…</div>
        <div class="product-card-footer">
          <span>查看詳情・銷售話術</span>
          <span>›</span>
        </div>
      </div>
    </div>`).join('');

  showPage('category');
}

// ══════════════════════════════
// SHOW PRODUCT DETAIL
// ══════════════════════════════
function showProduct(pid) {
  const p = products[pid];
  if (!p) return;
  const cat = categories.find(c => c.id === p.cat);
  const pitchLabels = ['🎯 開場引入','💡 產品亮點','📊 科學依據','🌟 結語推薦'];

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-img-wrap">
      <img src="${p.img}" alt="${p.name}" class="detail-page-img">
      <div class="detail-overlay-header">
        <span class="detail-back" onclick="showCategory('${p.cat}')">‹ ${cat.name}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-name">${p.name}</div>
      <div class="detail-tagline">${p.tag}・${p.tagline}</div>
      <div class="detail-tags">
        ${p.badges.map(b=>`<span class="detail-tag ${b.c}" style="background:${b.c==='tag-gov'?'#FF8F00':'#4CAF50'};color:#fff">${b.t}</span>`).join('')}
        <span class="detail-tag" style="background:#E8F5E9;color:#1B5E20">${p.diet}</span>
      </div>

      <div class="detail-section">
        <div class="detail-section-title"><span>✨</span> 核心功效</div>
        ${p.benefits.map(b=>`<div class="bullet"><span class="bullet-dot">•</span><span class="bullet-text">${b}</span></div>`).join('')}
      </div>

      <div class="detail-section">
        <div class="detail-section-title"><span>🔬</span> 主要成分</div>
        ${p.ingredients.map((i,idx)=>`<span class="chip ${idx<2?'chip-green':'chip-purple'}">${i}</span>`).join('')}
      </div>

      <div class="detail-section">
        <div class="detail-section-title"><span>💬</span> 銷售話術</div>
        ${p.salesPitch.map((s,i)=>`
          <div class="sales-box">
            <div class="sales-label">${pitchLabels[i]||'💬 重點'}</div>
            <p>${s}</p>
          </div>`).join('')}
      </div>

      <div class="detail-section">
        <div class="detail-section-title"><span>ℹ️</span> 產品資訊</div>
        <div class="info-row"><span class="info-label">👥 適用</span><span class="info-value">${p.target}</span></div>
        <div class="info-row"><span class="info-label">🥗 飲食</span><span class="info-value">${p.diet}</span></div>
      </div>

      <div class="detail-section" style="margin-bottom:20px">
        <div class="detail-section-title"><span>📋</span> 食用方式</div>
        <div class="usage-box"><span style="font-size:22px">💊</span><span class="usage-text">${p.usage}</span></div>
      </div>
    </div>`;
  showPage('detail');
}

// ══════════════════════════════
// SEARCH
// ══════════════════════════════
function doSearch(q) {
  const el = document.getElementById('search-results');
  if (!q.trim()) { el.innerHTML='<div class="search-empty"><div style="font-size:44px;margin-bottom:10px">🔍</div>輸入關鍵字搜尋產品</div>'; return; }
  const results = Object.values(products).filter(p =>
    [p.name,p.tagline,p.tag,p.catName,p.target,p.diet,...p.benefits,...p.ingredients,...p.salesPitch].some(t=>t.toLowerCase().includes(q.toLowerCase())));
  if (!results.length) { el.innerHTML=`<div class="search-empty"><div style="font-size:44px;margin-bottom:10px">😕</div>找不到「${q}」相關產品</div>`; return; }
  el.innerHTML = results.map(p=>`
    <div class="search-item" onclick="showProduct('${p.id}')">
      <img src="${p.img}" alt="" class="search-item-img">
      <div class="search-item-info">
        <div class="search-item-name">${p.name}</div>
        <div class="search-item-cat">${p.catName}</div>
        <div class="search-item-target">適用：${p.target.split('／')[0]}</div>
      </div>
      <span style="font-size:20px;color:var(--primary-light)">›</span>
    </div>`).join('');
}

// DISEASE PAGE
// ══════════════════════════════
function renderDiseases() {
  document.getElementById('disease-list').innerHTML = diseases.map(d => `
    <div class="disease-card">
      <div class="disease-header" onclick="toggleD(${d.num})">
        <div class="disease-num" style="background:${d.color}">${d.num}</div>
        <span style="font-size:26px">${d.emoji}</span>
        <span class="disease-name-text">${d.name}</span>
        <span class="disease-arrow" id="arr${d.num}">›</span>
      </div>
      <div class="disease-body" id="db${d.num}">
        <div class="disease-desc">${d.desc}</div>
        <div class="nutrient-title">🔑 關鍵保健營養素</div>
        <div class="nutrient-grid">${d.key.map(n=>`<span class="nc-key">${n}</span>`).join('')}</div>
        <div class="nutrient-title">➕ 輔助營養素</div>
        <div class="nutrient-grid">${d.sup.map(n=>`<span class="nc-sup">${n}</span>`).join('')}</div>
        <div class="avon-rec">
          <div class="avon-rec-title">🌿 推薦康采產品</div>
          ${d.rec.map(r=>`<span class="avon-chip">${r}</span>`).join('')}
        </div>
      </div>
    </div>`).join('');
}

function toggleD(n) {
  document.getElementById('db'+n).classList.toggle('open');
  document.getElementById('arr'+n).classList.toggle('open');
}

// ══════════════════════════════
// NAV
// ══════════════════════════════
function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const nav = document.getElementById('nav-'+page);
  if (nav) nav.classList.add('active');
  window.scrollTo(0,0);
}
function showSearch() {
  showPage('search');
  document.getElementById('nav-search').classList.add('active');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}

// INIT
renderHome();
renderDiseases();
</script>
