<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>康采銷售助手</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --primary:#2E7D32; --primary-light:#4CAF50; --primary-dark:#1B5E20;
  --secondary:#FF8F00; --bg:#F5F5F5; --card:#FFF; --text:#212121;
  --text-light:#757575; --border:#E0E0E0; --shadow:0 2px 12px rgba(0,0,0,.1);
  --radius:16px; --nav:64px;
}
body { font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; min-height:100vh; overflow-x:hidden; }
.app-header { background:linear-gradient(135deg,#1B5E20,#2E7D32,#4CAF50); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.header-left { display:flex; align-items:center; gap:10px; }
.logo-icon { font-size:24px; }
.app-title { font-size:17px; font-weight:700; }
.app-subtitle { font-size:10px; opacity:.8; }
.search-btn { font-size:22px; cursor:pointer; }
.page { display:none; padding-bottom:calc(var(--nav) + 12px); min-height:calc(100vh - 56px); animation:fadeIn .2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:var(--nav); background:#fff; border-top:1px solid var(--border); display:flex; box-shadow:0 -2px 12px rgba(0,0,0,.08); z-index:200; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--text-light); transition:.2s; }
.nav-item.active { color:var(--primary); }
.nav-icon { font-size:22px; }
.nav-label { font-size:10px; font-weight:600; }
.hero { background:linear-gradient(135deg,#1B5E20,#2E7D32,#388E3C); color:#fff; padding:20px; margin-bottom:8px; position:relative; overflow:hidden; }
.hero::after { content:'🌿'; position:absolute; right:-10px; bottom:-10px; font-size:100px; opacity:.12; }
.hero-title { font-size:22px; font-weight:800; margin-bottom:6px; }
.hero-sub { font-size:12px; opacity:.85; line-height:1.5; }
.hero-badge { display:inline-block; background:var(--secondary); color:#fff; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; margin-top:10px; }
.section-title { font-size:12px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.8px; padding:14px 20px 8px; }
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 8px; }
.cat-card { background:#fff; border-radius:var(--radius); padding:16px 14px; cursor:pointer; box-shadow:var(--shadow); border:2px solid transparent; position:relative; overflow:hidden; transition:.2s; }
.cat-card:active { transform:scale(.97); }
.cat-bar { position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:4px 0 0 4px; }
.cat-emoji { font-size:30px; display:block; margin-bottom:8px; }
.cat-name { font-size:13px; font-weight:700; line-height:1.3; }
.cat-count { font-size:11px; color:var(--text-light); margin-top:3px; }
.disease-cta { margin:0 16px 16px; background:linear-gradient(135deg,#1A237E,#3949AB); color:#fff; border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; }
.disease-cta:active { opacity:.9; }
.cat-page-header { padding:16px 20px 12px; background:#fff; border-bottom:1px solid var(--border); margin-bottom:10px; }
.cat-page-title { font-size:20px; font-weight:800; }
.cat-page-desc { font-size:12px; color:var(--text-light); margin-top:4px; line-height:1.5; }
.product-list { padding:0 16px; display:flex; flex-direction:column; gap:12px; }
.product-card { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:.2s; }
.product-card:active { transform:scale(.99); }
.product-card-img { height:180px; overflow:hidden; position:relative; background:#f9f9f9; }
.product-card-img img { width:100%; height:100%; object-fit:contain; object-position:center; }
.product-card-img .img-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; backdrop-filter:blur(4px); }
.product-card-img .img-tag { position:absolute; bottom:8px; right:8px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; }
.product-card-img .img-tagline { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,.65)); color:#fff; font-size:11px; font-weight:700; padding:20px 10px 8px; line-height:1.4; }
.tag-veg { background:#4CAF50; color:#fff; }
.tag-gov { background:#FF8F00; color:#fff; }
.product-card-body { padding:12px 16px; }
.product-card-name { font-size:15px; font-weight:700; }
.product-card-tagline { font-size:12px; color:var(--primary); font-weight:600; margin-top:3px; }
.product-card-target { font-size:11px; color:var(--text-light); margin-top:5px; line-height:1.4; }
.product-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.product-card-footer span { font-size:12px; color:var(--primary); font-weight:600; }
.detail-page-img { width:100%; max-height:260px; object-fit:contain; object-position:center; display:block; background:#f9f9f9; }
.detail-back { display:flex; align-items:center; gap:6px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
.detail-overlay-header { position:absolute; top:0; left:0; right:0; background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent); padding:14px 16px; z-index:2; }
.detail-img-wrap { position:relative; }
.detail-body { padding:0 16px; }
.detail-name { font-size:21px; font-weight:800; margin-top:14px; }
.detail-tagline { font-size:14px; color:var(--primary); font-weight:600; margin-top:3px; }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.detail-tag { font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }
.detail-section { background:#fff; border-radius:var(--radius); padding:14px 16px; margin-top:12px; box-shadow:var(--shadow); }
.detail-section-title { font-size:13px; font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:6px; margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid #E8F5E9; }
.bullet { display:flex; gap:8px; margin-bottom:7px; align-items:flex-start; }
.bullet-dot { color:var(--primary); font-size:16px; line-height:1.4; flex-shrink:0; }
.bullet-text { font-size:13px; line-height:1.5; }
.chip { display:inline-block; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; margin:3px; }
.chip-green { background:#E8F5E9; color:#1B5E20; }
.chip-purple { background:#F3E5F5; color:#6A1B9A; }
.sales-box { background:linear-gradient(135deg,#FFF8E1,#FFF3E0); border-left:4px solid var(--secondary); border-radius:8px; padding:11px 13px; margin-bottom:8px; }
.sales-box p { font-size:12px; line-height:1.6; }
.sales-label { font-size:11px; font-weight:700; color:var(--secondary); margin-bottom:3px; }
.usage-box { background:#E3F2FD; border-radius:12px; padding:12px 14px; display:flex; gap:10px; align-items:flex-start; }
.usage-text { font-size:13px; line-height:1.6; color:#1565C0; font-weight:500; }
.info-row { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.info-row:last-child { border-bottom:none; }
.info-label { font-size:11px; font-weight:700; color:var(--text-light); min-width:55px; }
.info-value { font-size:12px; line-height:1.5; flex:1; }
.search-bar { padding:12px 16px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:50; }
.search-wrap { position:relative; }
.search-input { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:10px 14px 10px 40px; font-size:14px; outline:none; font-family:inherit; transition:border-color .2s; }
.search-input:focus { border-color:var(--primary); }
.search-icon-abs { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:17px; color:var(--text-light); }
.search-results { padding:12px 16px; }
.search-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:13px; }
.search-item { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:9px; cursor:pointer; box-shadow:var(--shadow); display:flex; gap:10px; align-items:center; transition:.2s; }
.search-item:active { transform:scale(.99); }
.search-item-img { width:56px; height:56px; border-radius:10px; object-fit:cover; object-position:left; flex-shrink:0; }
.search-item-info { flex:1; min-width:0; }
.search-item-name { font-size:13px; font-weight:700; }
.search-item-cat { font-size:11px; color:var(--primary); font-weight:600; margin-top:2px; }
.search-item-target { font-size:11px; color:var(--text-light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.disease-hero { background:linear-gradient(135deg,#1A237E,#283593,#3949AB); color:#fff; padding:20px; margin-bottom:12px; position:relative; overflow:hidden; }
.disease-hero::after { content:'🏥'; position:absolute; right:-10px; bottom:-10px; font-size:90px; opacity:.15; }
.disclaimer { background:#FFF3E0; border-left:4px solid var(--secondary); padding:9px 13px; margin:0 16px 12px; border-radius:0 8px 8px 0; font-size:11px; color:#E65100; line-height:1.5; }
.disease-card { background:#fff; border-radius:var(--radius); margin:0 16px 12px; box-shadow:var(--shadow); overflow:hidden; }
.disease-header { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; }
.disease-num { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; flex-shrink:0; }
.disease-name-text { font-size:15px; font-weight:700; flex:1; }
.disease-arrow { font-size:18px; color:var(--text-light); transition:transform .3s; }
.disease-arrow.open { transform:rotate(90deg); }
.disease-body { display:none; padding:0 14px 13px; border-top:1px solid var(--border); }
.disease-body.open { display:block; animation:fadeIn .2s ease; }
.disease-desc { font-size:12px; color:var(--text-light); line-height:1.5; padding:9px 0 6px; }
.nutrient-title { font-size:11px; font-weight:700; margin:6px 0 5px; }
.nutrient-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.nc-key { background:#E8F5E9; color:#1B5E20; border:1.5px solid #A5D6A7; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }
.nc-sup { background:#E3F2FD; color:#1565C0; border:1.5px solid #90CAF9; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }
.avon-rec { margin-top:9px; padding-top:9px; border-top:1px dashed var(--border); }
.avon-rec-title { font-size:11px; font-weight:700; color:var(--secondary); margin-bottom:5px; }
.avon-chip { display:inline-block; background:linear-gradient(135deg,#FFF8E1,#FFECB3); color:#E65100; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; margin:2px; border:1px solid #FFB300; cursor:pointer; }

/* ===== Health Assessment ===== */
.quiz-hero { background:linear-gradient(135deg,#0D47A1,#1565C0,#1976D2); color:#fff; padding:20px; margin-bottom:0; position:relative; overflow:hidden; }
.quiz-hero::after { content:'💊'; position:absolute; right:-10px; bottom:-10px; font-size:90px; opacity:.15; }
.quiz-progress-wrap { padding:14px 20px 10px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:50; }
.quiz-progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-light); margin-bottom:6px; }
.quiz-progress-bar { height:6px; background:#E0E0E0; border-radius:3px; overflow:hidden; }
.quiz-progress-fill { height:100%; background:linear-gradient(90deg,#1565C0,#42A5F5); border-radius:3px; transition:width .4s ease; }
.quiz-q-wrap { padding:0 16px 16px; }
.quiz-q-num { font-size:11px; font-weight:700; color:#1565C0; margin:18px 0 4px; text-transform:uppercase; letter-spacing:.8px; }
.quiz-q-text { font-size:17px; font-weight:800; line-height:1.45; margin-bottom:16px; color:var(--text); }
.quiz-opt { display:flex; align-items:flex-start; gap:12px; background:#fff; border:2px solid var(--border); border-radius:14px; padding:13px 14px; margin-bottom:10px; cursor:pointer; transition:.15s; }
.quiz-opt:active { transform:scale(.98); }
.quiz-opt.selected { border-color:#1565C0; background:#E3F2FD; }
.quiz-opt-icon { width:28px; height:28px; border-radius:50%; background:#F5F5F5; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.quiz-opt.selected .quiz-opt-icon { background:#1565C0; color:#fff; }
.quiz-opt-text { font-size:14px; line-height:1.45; padding-top:3px; }
.quiz-nav-row { display:flex; gap:10px; margin:6px 16px 20px; }
.quiz-btn { flex:1; padding:13px; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; }
.quiz-btn-prev { background:#F5F5F5; color:var(--text); }
.quiz-btn-next { background:#1565C0; color:#fff; }
.quiz-btn:disabled { opacity:.4; cursor:not-allowed; }
.quiz-btn:active:not(:disabled) { transform:scale(.97); }
.quiz-start-btn { display:block; width:calc(100% - 32px); margin:16px auto; padding:15px; background:#1565C0; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
.quiz-start-btn:active { transform:scale(.98); }
/* Results */
.result-hero { background:linear-gradient(135deg,#1B5E20,#2E7D32); color:#fff; padding:22px 20px; text-align:center; }
.result-score-ring { width:96px; height:96px; border-radius:50%; border:5px solid rgba(255,255,255,.4); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:12px auto; background:rgba(255,255,255,.15); }
.result-score-num { font-size:32px; font-weight:800; line-height:1; }
.result-score-lbl { font-size:11px; opacity:.85; margin-top:2px; }
.result-status { font-size:14px; font-weight:700; margin-top:10px; }
.result-sections { padding:0 16px 16px; }
.result-area-card { background:#fff; border-radius:var(--radius); padding:15px; margin-top:12px; box-shadow:var(--shadow); border-left:4px solid #ccc; }
.result-area-card.lv3 { border-left-color:#E53935; }
.result-area-card.lv2 { border-left-color:#FF8F00; }
.result-area-card.lv1 { border-left-color:#4CAF50; }
.result-area-title { font-size:15px; font-weight:800; display:flex; align-items:center; gap:7px; }
.result-area-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.lv3 .result-area-badge { background:#FFEBEE; color:#C62828; }
.lv2 .result-area-badge { background:#FFF3E0; color:#E65100; }
.lv1 .result-area-badge { background:#E8F5E9; color:#1B5E20; }
.result-area-desc { font-size:12px; color:var(--text-light); line-height:1.6; margin-top:6px; }
.result-nutrient { font-size:11px; font-weight:700; color:#1565C0; margin:10px 0 5px; }
.result-prod-list { display:flex; flex-wrap:wrap; gap:6px; }
.result-prod-chip { font-size:11px; font-weight:600; padding:4px 10px; background:linear-gradient(135deg,#FFF8E1,#FFECB3); color:#E65100; border:1px solid #FFB300; border-radius:20px; cursor:pointer; }
.result-prod-chip:active { transform:scale(.97); }
.result-retake { display:block; width:calc(100% - 32px); margin:16px auto; padding:13px; background:#F5F5F5; color:var(--text); border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }

/* Buy button */
.buy-btn-wrap { padding:0 16px 16px; margin-top:4px; }
.buy-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:15px; background:linear-gradient(135deg,#C8102E,#E53935); color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:800; text-decoration:none; font-family:inherit; cursor:pointer; box-shadow:0 4px 16px rgba(200,16,46,.35); transition:.15s; }
.buy-btn:active { transform:scale(.97); opacity:.92; }
.buy-btn-logo { background:#fff; border-radius:3px; padding:1px 5px; font-size:11px; font-weight:900; color:#C8102E; letter-spacing:.5px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <svg width="44" height="28" viewBox="0 0 44 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;border-radius:3px"><rect width="44" height="28" fill="#C8102E"/><text x="22" y="19.5" font-family="Arial Black,Arial,sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="1">AVON</text></svg>
    <span class="logo-icon">🌿</span>
    <div>
      <div class="app-title">康采銷售助手</div>
      <div class="app-subtitle">台灣雅芳 AVON 全系列營養品</div>
    </div>
  </div>
  <span class="search-btn" onclick="showSearch()">🔍</span>
</header>

<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-title">康采系列<br>35款全產品介紹</div>
    <div class="hero-sub">成分解析・銷售話術・適用對象・食用方式</div>
    <span class="hero-badge">✦ 直銷商專用工具</span>
  </div>
  <div class="section-title">產品分類</div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="section-title">身體系統保健建議</div>
  <div class="disease-cta" onclick="showPage('disease')">
    <span style="font-size:34px">🏥</span>
    <div><div style="font-size:15px;font-weight:700">9大身體系統保健建議</div><div style="font-size:11px;opacity:.85;margin-top:2px">疾病困擾 × 保健營養素 × 推薦產品</div></div>
    <span style="font-size:20px;margin-left:auto">›</span>
  </div>
</div>

<div id="page-category" class="page">
  <div class="cat-page-header" id="cat-page-header"></div>
  <div class="product-list" id="product-list"></div>
</div>

<div id="page-detail" class="page">
  <div id="detail-content"></div>
</div>

<div id="page-search" class="page">
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon-abs">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="搜尋產品名稱、功效、成分..." oninput="doSearch(this.value)">
    </div>
  </div>
  <div class="search-results" id="search-results">
    <div class="search-empty"><div style="font-size:44px;margin-bottom:10px">🔍</div>輸入關鍵字搜尋產品</div>
  </div>
</div>

<div id="page-disease" class="page">
  <div class="disease-hero">
    <div style="font-size:19px;font-weight:800;margin-bottom:5px">🏥 9大身體系統保健建議</div>
    <div style="font-size:12px;opacity:.8;line-height:1.5">對應疾病困擾・建議營養素・推薦康采產品<br>協助客戶找到最適合的保健方向</div>
  </div>
  <div class="disclaimer">⚠️ 以下為保健參考資訊，非醫療建議。如有疾病症狀請諮詢專業醫師。保健食品不能取代藥物治療。</div>
  <div id="disease-list"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showPage('home')"><span class="nav-icon">🏠</span><span class="nav-label">首頁</span></div>
  <div class="nav-item" id="nav-search" onclick="showSearch()"><span class="nav-icon">🔍</span><span class="nav-label">搜尋</span></div>
  <div class="nav-item" id="nav-disease" onclick="showPage('disease')"><span class="nav-icon">🏥</span><span class="nav-label">保健建議</span></div>
  <div class="nav-item" id="nav-assessment" onclick="showPage('assessment')"><span class="nav-icon">📋</span><span class="nav-label">健康測評</span></div>
</nav>

<div id="page-assessment" class="page">
  <div class="quiz-hero">
    <div style="font-size:19px;font-weight:800;margin-bottom:5px">📋 個人健康狀況測評</div>
    <div style="font-size:12px;opacity:.85;line-height:1.5">10道問題・自我檢視健康狀況<br>結果分析建議適合的保健方向</div>
  </div>
  <div id="quiz-container"></div>
</div>
<script>

      <span style="font-size:28px">${cat.emoji}</span>
      <div>
        <div class="cat-page-title">${cat.name}</div>
        <div style="font-size:11px;color:var(--text-light)">${prods.length} 項產品</div>
      </div>
    </div>
    <div class="cat-page-desc">${cat.desc}</div>`;

  document.getElementById('product-list').innerHTML = prods.map(p => `

function doSearch(q) {
  const el = document.getElementById('search-results');
  if (!q.trim()) { el.innerHTML='<div class="search-empty"><div style="font-size:44px;margin-bottom:10px">🔍</div>輸入關鍵字搜尋產品</div>'; return; }
  const results = Object.values(products).filter(p =>
    [p.name,p.tagline,p.tag,p.catName,p.target,p.diet,...p.benefits,...p.ingredients,...p.salesPitch].some(t=>t.toLowerCase().includes(q.toLowerCase())));
  if (!results.length) { el.innerHTML=`<div class="search-empty"><div style="font-size:44px;margin-bottom:10px">😕</div>找不到「${q}」相關產品</div>`; return; }
  el.innerHTML = results.map(p=>`
    <div class="search-item" onclick="showProduct('${p.id}')">
      <img src="${p.img}" alt="" class="search-item-img">
      <div class="search-item-info">
        <div class="search-item-name">${p.name}</div>
        <div class="search-item-cat">${p.catName}</div>
        <div class="search-item-target">適用：${p.target.split('／')[0]}</div>
      </div>
      <span style="font-size:20px;color:var(--primary-light)">›</span>
    </div>`).join('');
}

let quizAnswers = {};
let quizCurrentQ = 0;
let quizStarted = false;

function renderQuiz() {
  const c = document.getElementById('quiz-container');
  if (!quizStarted) {
    c.innerHTML = `
      <div style="padding:20px 16px">
        <div style="background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.1);margin-bottom:14px">
          <div style="font-size:14px;font-weight:700;color:#1565C0;margin-bottom:10px">📌 測評說明</div>
          <div style="font-size:13px;line-height:1.7;color:#555">
            本測評包含 <strong>10個健康面向</strong>，每個問題選擇最符合您目前狀況的選項。<br><br>
            測評結果將分析您需要特別關注的健康面向，並提供 <strong>個人化營養補充建議</strong>與推薦產品。<br><br>
            ⚠️ 本測評僅供健康參考，不代表醫療診斷，如有疾病請諮詢專業醫師。
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
          ${quizQuestions.map(q=>`<div style="background:#fff;border-radius:10px;padding:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;align-items:center;gap:6px"><span style="font-size:18px">${q.emoji}</span><span style="font-size:12px;font-weight:600">${q.area}</span></div>`).join('')}
        </div>
        <button class="quiz-start-btn" onclick="startQuiz()">開始測評 →</button>
      </div>`;
    return;
  }
  if (quizCurrentQ >= quizQuestions.length) { renderResult(); return; }
  const q = quizQuestions[quizCurrentQ];
  const pct = Math.round((quizCurrentQ / quizQuestions.length) * 100);
  const chosen = quizAnswers[q.id];
  c.innerHTML = `
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-label"><span>第 ${quizCurrentQ+1} 題，共 ${quizQuestions.length} 題</span><span>${pct}%</span></div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-q-wrap">
      <div class="quiz-q-num">${q.emoji} ${q.area}</div>
      <div class="quiz-q-text">${q.text}</div>
      ${q.opts.map((o,i)=>`
        <div class="quiz-opt ${chosen===i?'selected':''}" onclick="selectOpt(${i})">
          <div class="quiz-opt-icon">${chosen===i?'✓':o.icon}</div>
          <div class="quiz-opt-text">${o.text}</div>
        </div>`).join('')}
    </div>
    <div class="quiz-nav-row">
      <button class="quiz-btn quiz-btn-prev" onclick="quizPrev()" ${quizCurrentQ===0?'disabled':''}>← 上一題</button>
      <button class="quiz-btn quiz-btn-next" onclick="quizNext()" ${chosen===undefined?'disabled':''}>
        ${quizCurrentQ===quizQuestions.length-1?'查看結果 ✓':'下一題 →'}
      </button>
    </div>`;
}

function startQuiz() { quizStarted=true; quizCurrentQ=0; quizAnswers={}; renderQuiz(); window.scrollTo(0,0); }
function selectOpt(i) {
  quizAnswers[quizQuestions[quizCurrentQ].id] = i;
  renderQuiz();
}
function quizNext() {
  if (quizAnswers[quizQuestions[quizCurrentQ].id]===undefined) return;
  quizCurrentQ++;
  renderQuiz(); window.scrollTo(0,0);
}
function quizPrev() {
  if (quizCurrentQ>0) { quizCurrentQ--; renderQuiz(); window.scrollTo(0,0); }
}

function renderResult() {
  // Collect scores: 0=good,1=mild,2=moderate,3=severe
  const areas = quizQuestions.map(q=>({ ...areaInfo[q.id], score: quizAnswers[q.id]||0 }));
  const totalScore = areas.reduce((s,a)=>s+a.score,0);
  const maxScore = quizQuestions.length * 3;
  const pct = Math.round((1 - totalScore/maxScore)*100);
  let statusEmoji, statusText, statusColor;
  if (pct>=80){ statusEmoji='🌟'; statusText='健康狀況良好，繼續保持！'; statusColor='#2E7D32'; }
  else if (pct>=60){ statusEmoji='😊'; statusText='整體尚可，部分面向需加強'; statusColor='#1565C0'; }
  else if (pct>=40){ statusEmoji='😐'; statusText='多個面向需要加強保健'; statusColor='#FF8F00'; }
  else { statusEmoji='😟'; statusText='健康警訊！建議積極補充保健'; statusColor='#E53935'; }

  const sorted = [...areas].sort((a,b)=>b.score-a.score);
  const concerns = sorted.filter(a=>a.score>0);

  const c = document.getElementById('quiz-container');
  c.innerHTML = `
    <div class="result-hero">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px">您的健康測評結果</div>
      <div class="result-score-ring">
        <div class="result-score-num">${pct}</div>
        <div class="result-score-lbl">健康指數</div>
      </div>
      <div style="font-size:22px;margin-top:4px">${statusEmoji}</div>
      <div class="result-status">${statusText}</div>
    </div>
    <div class="result-sections">
      ${concerns.length===0
        ? `<div style="text-align:center;padding:30px;color:var(--text-light);font-size:14px">🎉 恭喜！您的健康狀況非常好！<br>建議持續補充基礎營養素維持現況。</div>`
        : concerns.map(a=>{
            const lv = a.score>=3?'lv3':a.score===2?'lv2':'lv1';
            const lvLabel = a.score>=3?'需要立即關注':a.score===2?'建議加強補充':'可適度補充';
            return `<div class="result-area-card ${lv}">
              <div class="result-area-title">
                <span>${a.emoji}</span>
                <span>${a.label}</span>
                <span class="result-area-badge">${lvLabel}</span>
              </div>
              <div class="result-area-desc">${a.desc}</div>
              <div class="result-nutrient">建議關鍵營養素</div>
              <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
                ${a.nutrients.map(n=>`<span style="font-size:11px;font-weight:600;padding:3px 9px;background:#E3F2FD;color:#1565C0;border-radius:20px">${n}</span>`).join('')}
              </div>
              <div class="result-nutrient">推薦康采產品</div>
              <div class="result-prod-list">
                ${a.productIds.map(p=>`<span class="result-prod-chip" onclick="showProduct('${p.id}')">→ ${p.name}</span>`).join('')}
              </div>
            </div>`;
          }).join('')
      }
      <div style="background:#E8F5E9;border-radius:12px;padding:12px 14px;margin-top:12px;font-size:12px;color:#1B5E20;line-height:1.6">
        💡 點擊產品名稱可直接查看詳細介紹與銷售話術
      </div>
      <button class="result-retake" onclick="retakeQuiz()">🔄 重新測評</button>
    </div>`;
}


function retakeQuiz() { quizStarted=false; quizAnswers={}; quizCurrentQ=0; renderQuiz(); window.scrollTo(0,0); }
function renderAssessment() { quizStarted=false; quizAnswers={}; quizCurrentQ=0; renderQuiz(); }
function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(page==='assessment'){ renderQuiz(); }
  const nav = document.getElementById('nav-'+page);
  if (nav) nav.classList.add('active');
  window.scrollTo(0,0);
}
function showSearch() {
  showPage('search');
  document.getElementById('nav-search').classList.add('active');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}

renderHome();
renderDiseases();
renderAssessment();
</script>
